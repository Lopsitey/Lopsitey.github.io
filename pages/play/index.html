<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="darkreader-lock">
    <meta name="description" content="Jake Astles - Play page for browser-playable projects.">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <title>Jake Astles | Play</title><!--Last word must be navbar link name for link to be highlighted-->
    <link href="/css/bootstrap-5.0.2.min.css" rel="stylesheet">
    <link href="/css/custom.css" rel="stylesheet">

  <body class="play-page">
    <div id="navbar-placeholder"></div>
    <script src="/js/site-interactions.js"></script>
    <script src="/js/navbar-loader.js"></script>

    <section class="hero-section">
      <div class="jumbotron text-center mt-5">
        <div class="container">
          <div class="row">
            <div class="col-12">
              <h1>Play</h1>
              <p><b class="section-kicker">Browser Playable Projects</b></p>
              <p>Play my projects directly in your browser. More titles will be added soon.</p>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="play-projects-section">
      <div class="row row-cols-1 row-cols-md-3 g-4">
        <div class="col">
          <a href="/pages/play/Tank-ECS/" class="text-decoration-none text-reset" aria-label="Open Tank ECS playable build">
            <div class="card h-100">
              <img src="/media/Tank ECS Fallback.webp" class="card-img-top" alt="Tank ECS playable build preview">
              <div class="card-body">
                <h5 class="card-title">Tank ECS</h5>
                <p class="card-text">Play in browser.</p>
              </div>
            </div>

        </div>
        <div class="col">
          <div class="card h-100">
            <img src="/media/bkg_06.jpg" class="card-img-top" alt="Placeholder image for playable project two">
            <div class="card-body">
              <h5 class="card-title">Project Slot 2</h5>
              <p class="card-text">Coming soon.</p>
            </div>
          </div>
        </div>
        <div class="col">
          <div class="card h-100">
            <img src="/media/bkg_06.jpg" class="card-img-top" alt="Placeholder image for playable project three">
            <div class="card-body">
              <h5 class="card-title">Project Slot 3</h5>
              <p class="card-text">Coming soon.</p>
            </div>
          </div>
        </div>
      </div>
    </section>

    <div id="contact-placeholder"></div>
    <div id="footer-placeholder"></div>

    <script src="/js/contact-form.js"></script>
    <script src="/js/donation-box-loader.js"></script>
    <script src="/js/contact-loader.js"></script>
    <script src="/js/footer-loader.js"></script>
  </body>
</html>
